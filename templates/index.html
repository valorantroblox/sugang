<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIS 수강신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; min-height: 100vh; }
        .login-card { max-width: 400px; width: 100%; margin: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
    </style>
</head>
<body>
    <div class="container px-4">
        <div class="card login-card p-4">
            <h3 class="text-center fw-bold mb-4" style="color: #002d5d;">KIS 수강신청</h3>
            <form action="/select_subjects" method="post">
                <div class="mb-3"><label class="form-label small fw-bold">학번</label><input type="text" name="student_id" class="form-control" required></div>
                <div class="mb-3"><label class="form-label small fw-bold">이름</label><input type="text" name="student_name" class="form-control" required></div>
                <div class="row g-2 mb-4">
                    <div class="col-6"><label class="form-label small fw-bold">학년</label><select name="grade" class="form-select"><option value="11">11학년</option><option value="12">12학년</option></select></div>
                    <div class="col-6"><label class="form-label small fw-bold">학기</label><select name="semester" class="form-select"><option value="1학기">1학기</option><option value="2학기">2학기</option></select></div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">과목 선택 시작</button>
            </form>
        </div>
    </div>
</body>
</html>
