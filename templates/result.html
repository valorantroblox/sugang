<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 파비콘 설정 코드 --> 
    <link rel="icon" href="https://lh6.googleusercontent.com/proxy/1gPVltbenQ0_dtr_CzsDtUKKq0wl3dhvHlOCpaQCNMe4QZIjBFedPOJ7LvUsG28oGE1rUSPuiNBEG9uuEoZg" type="image/x-icon">
    <meta charset="UTF-8">
    <title>신청 확인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container text-center">
        <div class="card p-5 shadow mx-auto" style="max-width: 500px; border-radius: 15px;">
            <h2 class="text-success fw-bold mb-4">신청이 완료되었습니다!</h2>
            <div class="text-start mb-4">
                <p><strong>이름:</strong> {{ data.name }}</p>
                <p><strong>총 학점:</strong> {{ data.total_credits }} 학점</p>
                <p><strong>선택 과목:</strong> {{ data.subjects | join(', ') }}</p>
            </div>
            <p class="text-muted small">반 편성은 과목별 신청 인원에 따라 배정됩니다.</p>
            <a href="/" class="btn btn-primary w-100">메인으로</a>
        </div>
    </div>
</body>
</html>
