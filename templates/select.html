<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과목 선택</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-bottom: 100px; background-color: #f8f9fa; }
        .subject-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sticky-bottom { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 1000; }
        /* 예전 버튼 스타일 */
        .subject-btn { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="mb-4">
            <h4><b>{{ student_name }}</b>님 ({{ student_id }})</h4>
            <p class="text-muted">{{ grade }}학년 {{ semester }} 과목 선택</p>
        </div>

        <form action="/submit" method="post">
            <input type="hidden" name="student_id" value="{{ student_id }}">
            <input type="hidden" name="student_name" value="{{ student_name }}">

            <div class="subject-container">
                {% for category, list in subjects.items() %}
                <div class="mb-4">
                    <h5 class="fw-bold mb-3">{{ category }}</h5>
                    <div class="row">
                        {% for subject in list %}
                        <div class="col-12 col-md-6 subject-btn">
                            <!-- 버그 수정을 위해 id에 카테고리 추가 -->
                            {% set safe_id = category.replace('/', '').replace(' ', '') ~ loop.index0 %}
                            <input type="checkbox" class="btn-check" 
                                   id="sub-{{ safe_id }}" 
                                   name="selected_subjects" 
                                   value="{{ subject.name }}" 
                                   onchange="updateCredits()">
                            <label class="btn btn-outline-primary w-100 text-start d-flex justify-content-between" for="sub-{{ safe_id }}">
                                <span>{{ subject.name }} <small class="text-secondary">({{ subject.type }})</small></span>
                                <span>4학점</span>
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                    <hr>
                </div>
                {% endfor %}
            </div>

            <div class="sticky-bottom">
                <div class="container d-flex justify-content-between align-items-center">
                    <div>
                        <strong>현재 선택 학점: <span id="currentCredits" class="text-primary">0</span> / {{ target_credit }}</strong>
                    </div>
                    <button type="submit" class="btn btn-success px-4">신청하기</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function updateCredits() {
            const checkedCount = document.querySelectorAll('input[name="selected_subjects"]:checked').length;
            document.getElementById('currentCredits').innerText = checkedCount * 4;
        }
    </script>
</body>
</html>
